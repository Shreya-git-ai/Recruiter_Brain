ai_usage_summary: |
 - Used Claude as primary development assistant for architecture design,
    concept explanation (embeddings, cosine similarity, honeypot detection
    logic, datetime handling), and iterative debugging throughout the project.
  - Used ChatGPT occasionally for additional debugging and concept clarification.
  - All core engineering decisions were made independently — scoring formula
    design and weight tuning (multiple iterations based on real output
    analysis), honeypot detection checks, hard filter criteria, and the
    precomputed embedding approach for the 5-minute compute constraint.
  - No candidate data was sent to any external LLM API at any point.
  - The ranking pipeline has zero network calls during execution, per
    competition constraints.
  - AI tools were used as a learning and development aid, not as a
    replacement for engineering judgment.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  Multi-stage ranking pipeline designed for CPU-only, no-network, sub-5-minute
  runtime constraints on 100K candidates.

  -Filtering: Rule-based honeypot detection (signup-vs-active date checks,
  experience-vs-education consistency, overlapping job dates, skill-duration
  mismatches) eliminates ~80 adversarial profiles. Hard filters remove
  location-ineligible, pure-consulting-only, and pure-research-only candidates
  before any ML scoring — reducing embedding compute load significantly.

  -Semantic Matching: Sentence-transformer embeddings (all-MiniLM-L6-v2)
  compare JD requirements against candidate summary and career history text,
  deliberately excluding raw skills lists to avoid keyword-stuffing bias.
  Semantic similarity is the dominant signal (85% weight), chosen to reward
  Tier-5 candidates who describe relevant work in plain language without
  AI/ML jargon.

  -Career Fit Scoring: Domain-specific AI/ML/IR keyword evidence (15% weight)
  provides a secondary confidence boost. Multiplicative red-flag penalties
  for title-chasing (short average tenure) and non-coding-recency (managerial
  roles 18+ months) further refine scores.

  -Availability: Behavioral signals (recency, recruiter response rate,
  interview completion, offer acceptance) applied as a multiplier floored
  at 0.5x — down-weighting unreachable candidates without zeroing them out.

  -Compute Optimization: Full 100K embeddings precomputed offline once and
  cached to disk (.npy format). Ranking step only loads precomputed vectors,
  applies scoring and filtering, completing in under 2 minutes. Behavioral
  twin deduplication prevents near-duplicate profiles inflating top-100.
  Output strictly follows submission spec — 100 rows, unique ranks 1-100,
  monotonically non-increasing scores, tie-breaking by candidate_id ascending.

